<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Assignment Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --card-bg: #ffffff;
    --text: #2c2420;
    --text-muted: #8a7e76;
    --accent: #3d7c5f;
    --accent-light: #e8f3ed;
    --accent-dark: #2d5c46;
    --border: #e2dbd4;
    --check-bg: #3d7c5f;
    --overdue: #c4553a;
    --overdue-light: #fdf0ed;
    --due-soon: #c49a2a;
    --due-soon-light: #fdf8eb;
    --shadow: 0 1px 3px rgba(44,36,32,0.06);
    --shadow-lg: 0 4px 12px rgba(44,36,32,0.08);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  header {
    background: var(--card-bg);
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 14px;
  }

  .class-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .class-tabs::-webkit-scrollbar { display: none; }

  .class-tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .class-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .progress-bar-container {
    margin: 16px 20px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-text {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent-dark);
    white-space: nowrap;
  }

  .list-container {
    padding: 12px 20px 40px;
  }

  .assignment-item {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    transition: all 0.2s ease;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    border: 1.5px solid transparent;
  }

  .assignment-item:active {
    transform: scale(0.985);
  }

  .assignment-item.checked {
    opacity: 0.55;
    border-color: transparent;
  }

  .assignment-item.overdue:not(.checked) {
    border-color: var(--overdue);
    background: var(--overdue-light);
  }

  .assignment-item.due-soon:not(.checked) {
    border-color: var(--due-soon);
    background: var(--due-soon-light);
  }

  .checkbox {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
  }

  .assignment-item.checked .checkbox {
    background: var(--check-bg);
    border-color: var(--check-bg);
  }

  .checkbox svg {
    width: 14px;
    height: 14px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.25s ease;
  }

  .assignment-item.checked .checkbox svg {
    opacity: 1;
    transform: scale(1);
  }

  .assignment-info {
    flex: 1;
    min-width: 0;
  }

  .assignment-name {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.3;
    transition: all 0.2s ease;
  }

  .assignment-item.checked .assignment-name {
    text-decoration: line-through;
    color: var(--text-muted);
  }

  .assignment-link {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-color: var(--accent-light);
    text-underline-offset: 2px;
    transition: all 0.2s ease;
  }

  .assignment-link:hover, .assignment-link:active {
    text-decoration-color: var(--accent);
  }

  .assignment-item.checked .assignment-link {
    color: var(--text-muted);
  }

  .assignment-due {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: 400;
  }

  .assignment-item.overdue:not(.checked) .assignment-due {
    color: var(--overdue);
    font-weight: 600;
  }

  .assignment-item.due-soon:not(.checked) .assignment-due {
    color: var(--due-soon);
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state p {
    font-size: 1rem;
    line-height: 1.6;
  }

  .reset-btn {
    display: block;
    margin: 20px auto 0;
    padding: 10px 20px;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .reset-btn:hover {
    border-color: var(--overdue);
    color: var(--overdue);
  }
</style>
</head>
<body>

<header>
  <h1>Assignment Checklist</h1>
  <div class="class-tabs" id="classTabs"></div>
</header>

<div class="progress-bar-container" id="progressContainer">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <span class="progress-text" id="progressText"></span>
</div>

<div class="list-container" id="listContainer"></div>

<script>
// ============================================================
//  TEACHER: EDIT YOUR ASSIGNMENTS HERE
//  
//  Each class has an id, label, and list of assignments.
//  To add/remove assignments, just edit the arrays below.
//  Each assignment needs:
//    { id: "unique-id", name: "...", due: "YYYY-MM-DD" }
//
//  Optional: add a link to the assignment on Canvas, etc.
//    { id: "unique-id", name: "...", due: "YYYY-MM-DD", link: "https://..." }
//
//  IMPORTANT: Every assignment needs a unique "id" string.
//  This is what links a student's checkmark to the right
//  assignment. Use any short label — just don't reuse one
//  or change it after students have started checking off.
//
//  You can freely add, remove, or reorder assignments
//  without messing up anyone's saved checkmarks.
//
//  After editing, re-deploy the file (e.g. Netlify Drop).
// ============================================================

const CLASS_DATA = [
  {
    id: "a-foca",
    label: "FOCA A",
    assignments: [
      // { id: "af-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
  {
    id: "b-foca",
    label: "FOCA B",
    assignments: [
      // { id: "bf-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
  {
    id: "a-geometry",
    label: "GEO A",
    assignments: [
      // { id: "ag-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
  {
    id: "b-geometry",
    label: "GEO B",
    assignments: [
      // { id: "bg-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
];

// ============================================================
//  END OF TEACHER-EDITABLE SECTION
// ============================================================

const STORAGE_KEY = "checklist_v1";

function loadChecked() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveChecked(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getStatus(dueDateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(dueDateStr + "T00:00:00");
  const diffDays = (due - today) / (1000 * 60 * 60 * 24);
  if (diffDays < 0) return "overdue";
  if (diffDays <= 2) return "due-soon";
  return "";
}

function formatDate(dueDateStr) {
  const due = new Date(dueDateStr + "T00:00:00");
  const options = { weekday: "short", month: "short", day: "numeric" };
  return "Due " + due.toLocaleDateString("en-US", options);
}

let currentClassId = CLASS_DATA[0]?.id || "";

function renderTabs() {
  const container = document.getElementById("classTabs");
  container.innerHTML = "";
  CLASS_DATA.forEach(cls => {
    const btn = document.createElement("button");
    btn.className = "class-tab" + (cls.id === currentClassId ? " active" : "");
    btn.textContent = cls.label;
    btn.addEventListener("click", () => {
      currentClassId = cls.id;
      renderTabs();
      renderList();
    });
    container.appendChild(btn);
  });
}

function renderList() {
  const container = document.getElementById("listContainer");
  const cls = CLASS_DATA.find(c => c.id === currentClassId);

  if (!cls || cls.assignments.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No assignments yet.</p></div>';
    document.getElementById("progressContainer").style.display = "none";
    return;
  }

  document.getElementById("progressContainer").style.display = "flex";
  const checked = loadChecked();
  const classChecked = checked[currentClassId] || {};

  // Count completed
  const total = cls.assignments.length;
  const done = cls.assignments.filter(a => classChecked[a.id]).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = done + "/" + total;

  let html = "";
  cls.assignments.forEach(a => {
    const isChecked = classChecked[a.id] === true;
    const status = getStatus(a.due);
    const classes = ["assignment-item"];
    if (isChecked) classes.push("checked");
    if (status) classes.push(status);

    html += `
      <div class="${classes.join(" ")}" data-id="${a.id}">
        <div class="checkbox">
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="assignment-info">
          <div class="assignment-name">${a.link ? `<a href="${a.link}" class="assignment-link" target="_blank" rel="noopener">${a.name}</a>` : a.name}</div>
          <div class="assignment-due">${formatDate(a.due)}</div>
        </div>
      </div>`;
  });

  html += `<button class="reset-btn" id="resetBtn">Reset my checkmarks</button>`;
  container.innerHTML = html;

  // Attach click handlers
  container.querySelectorAll(".assignment-item").forEach(el => {
    el.addEventListener("click", (e) => {
      // Don't toggle checkbox when clicking a link
      if (e.target.closest(".assignment-link")) return;
      const aid = el.dataset.id;
      const checked = loadChecked();
      if (!checked[currentClassId]) checked[currentClassId] = {};
      checked[currentClassId][aid] = !checked[currentClassId][aid];
      saveChecked(checked);
      renderList();
    });
  });

  document.getElementById("resetBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    if (confirm("Reset all checkmarks for " + cls.label + "?")) {
      const checked = loadChecked();
      delete checked[currentClassId];
      saveChecked(checked);
      renderList();
    }
  });
}

renderTabs();
renderList();
</script>
</body>
</html>
