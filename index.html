<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Assignment Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Assignment Checklist</h1>
  <div class="class-tabs" id="classTabs"></div>
</header>

<div class="progress-bar-container" id="progressContainer">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <span class="progress-text" id="progressText"></span>
</div>

<div class="list-container" id="listContainer"></div>

<nav class="bottom-nav">
  <button class="nav-btn" id="navCanvas">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Canvas
  </button>
  <button class="nav-btn" id="navLaunchpad">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Launchpad
  </button>
  <a class="nav-btn" href="mailto:nvelasquez@aacps.org">
    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22 4 12 13 2 4"/></svg>
    Contact Me
  </a>
</nav>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <p class="modal-title">Which class are you in?</p>
    <div class="modal-buttons">
      <button class="modal-btn" data-class="foca">FOCA</button>
      <button class="modal-btn" data-class="geometry">Geometry</button>
    </div>
    <button class="modal-cancel" id="modalCancel">Cancel</button>
  </div>
</div>

<script>
// ============================================================
//  TEACHER: EDIT YOUR ASSIGNMENTS HERE
//  
//  Each class has an id, label, and list of assignments.
//  To add/remove assignments, just edit the arrays below.
//  Each assignment needs:
//    { id: "unique-id", name: "...", due: "YYYY-MM-DD" }
//
//  Optional: add a link to the assignment on Canvas, etc.
//    { id: "unique-id", name: "...", due: "YYYY-MM-DD", link: "https://..." }
//
//  IMPORTANT: Every assignment needs a unique "id" string.
//  This is what links a student's checkmark to the right
//  assignment. Use any short label — just don't reuse one
//  or change it after students have started checking off.
//
//  You can freely add, remove, or reorder assignments
//  without messing up anyone's saved checkmarks.
// ============================================================

const CLASS_DATA = [
  {
    id: "a-foca",
    label: "FOCA A",
    assignments: [
      // { id: "af-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
  {
    id: "b-foca",
    label: "FOCA B",
    assignments: [
      // { id: "bf-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
  {
    id: "a-geometry",
    label: "GEO A",
    assignments: [
      // { id: "ag-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
  {
    id: "b-geometry",
    label: "GEO B",
    assignments: [
      // { id: "bg-1", name: "Assignment Name", due: "2026-03-20", link: "https://..." },
    ]
  },
];

// ============================================================
//  END OF TEACHER-EDITABLE SECTION
// ============================================================

const STORAGE_KEY = "checklist_v1";

function loadChecked() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveChecked(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getStatus(dueDateStr) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(dueDateStr + "T00:00:00");
  const diffDays = (due - today) / (1000 * 60 * 60 * 24);
  if (diffDays < 0) return "overdue";
  if (diffDays <= 2) return "due-soon";
  return "";
}

function formatDate(dueDateStr) {
  const due = new Date(dueDateStr + "T00:00:00");
  const options = { weekday: "short", month: "short", day: "numeric" };
  return "Due " + due.toLocaleDateString("en-US", options);
}

let currentClassId = CLASS_DATA[0]?.id || "";

function renderTabs() {
  const container = document.getElementById("classTabs");
  container.innerHTML = "";
  CLASS_DATA.forEach(cls => {
    const btn = document.createElement("button");
    btn.className = "class-tab" + (cls.id === currentClassId ? " active" : "");
    btn.textContent = cls.label;
    btn.addEventListener("click", () => {
      currentClassId = cls.id;
      renderTabs();
      renderList();
    });
    container.appendChild(btn);
  });
}

function renderList() {
  const container = document.getElementById("listContainer");
  const cls = CLASS_DATA.find(c => c.id === currentClassId);

  if (!cls || cls.assignments.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No assignments yet.</p></div>';
    document.getElementById("progressContainer").style.display = "none";
    return;
  }

  document.getElementById("progressContainer").style.display = "flex";
  const checked = loadChecked();
  const classChecked = checked[currentClassId] || {};

  // Count completed
  const total = cls.assignments.length;
  const done = cls.assignments.filter(a => classChecked[a.id]).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = done + "/" + total;

  let html = "";
  cls.assignments.forEach(a => {
    const isChecked = classChecked[a.id] === true;
    const status = getStatus(a.due);
    const classes = ["assignment-item"];
    if (isChecked) classes.push("checked");
    if (status) classes.push(status);

    html += `
      <div class="${classes.join(" ")}" data-id="${a.id}">
        <div class="checkbox">
          <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="assignment-info">
          <div class="assignment-name">${a.link ? `<a href="${a.link}" class="assignment-link" target="_blank" rel="noopener">${a.name}</a>` : a.name}</div>
          <div class="assignment-due">${formatDate(a.due)}</div>
        </div>
      </div>`;
  });

  html += `<button class="reset-btn" id="resetBtn">Reset my checkmarks</button>`;
  container.innerHTML = html;

  // Attach click handlers
  container.querySelectorAll(".assignment-item").forEach(el => {
    el.addEventListener("click", (e) => {
      // Don't toggle checkbox when clicking a link
      if (e.target.closest(".assignment-link")) return;
      const aid = el.dataset.id;
      const checked = loadChecked();
      if (!checked[currentClassId]) checked[currentClassId] = {};
      checked[currentClassId][aid] = !checked[currentClassId][aid];
      saveChecked(checked);
      renderList();
    });
  });

  document.getElementById("resetBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    if (confirm("Reset all checkmarks for " + cls.label + "?")) {
      const checked = loadChecked();
      delete checked[currentClassId];
      saveChecked(checked);
      renderList();
    }
  });
}

renderTabs();
renderList();

// ---- Bottom Nav: Class Picker ----

const NAV_LINKS = {
  canvas: {
    foca: "https://aacps.instructure.com/courses/89906",
    geometry: "https://aacps.instructure.com/courses/88534",
  },
  launchpad: {
    foca: "https://docs.google.com/document/d/e/2PACX-1vTsag_GO99cftAr0zzSeVzZBiFz6lbjIi8zuy9ccGQFN2cTleQ5nMCOVEqnL-ihWBEqdowN2BI-mund/pub",
    geometry: "https://docs.google.com/document/d/e/2PACX-1vQVJbhXLq0oVdNOIbvOnjMS9fZSd9c-s0dwcOGg91lOSnc81O6dRTovfndH2jbGDQiaz356ig_jJGbg/pub",
  }
};

let activeNavTarget = null;
const overlay = document.getElementById("modalOverlay");

function openModal(target) {
  activeNavTarget = target;
  overlay.classList.add("visible");
}

function closeModal() {
  overlay.classList.remove("visible");
  activeNavTarget = null;
}

document.getElementById("navCanvas").addEventListener("click", () => openModal("canvas"));
document.getElementById("navLaunchpad").addEventListener("click", () => openModal("launchpad"));
document.getElementById("modalCancel").addEventListener("click", closeModal);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

document.querySelectorAll(".modal-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const cls = btn.dataset.class;
    const url = NAV_LINKS[activeNavTarget]?.[cls];
    if (url) window.open(url, "_blank", "noopener");
    closeModal();
  });
});
</script>
</body>
</html>
